<!DOCTYPE html>
<html>
<head>
  <title>Customer Investigation Tool</title>
</head>
<body style="font-family: Arial; padding: 20px;">
  <h2>Customer Investigation Tool</h2>

  <input id="mobile" placeholder="Enter Mobile Number" />
  <button onclick="searchCustomer()">Search</button>

  <div id="result" style="margin-top: 20px;"></div>

  <script>
    const SCRIPT_URL = "https://script.google.com/a/macros/voltmoney.in/s/AKfycbzCaLi4ZzKiE9w7sscUpAe29Uq8aeqkW8P2zPMIXCAsjByE8jkBf5gxoqi7gukxd8Xv5w/exec";

    async function searchCustomer() {
      const mobile = document.getElementById("mobile").value.trim();
      const resultDiv = document.getElementById("result");

      resultDiv.innerHTML = "Loading...";

      try {
        const response = await fetch(`${SCRIPT_URL}?mobile=${encodeURIComponent(mobile)}`);
        const data = await response.json();

        if (data.found) {
          resultDiv.innerHTML = `
            <p><strong>Mobile:</strong> ${data.mobile}</p>
            <p><strong>Name:</strong> ${data.account_holder_name}</p>
            <p><strong>Shortfall Amount:</strong> ${data.shortfall_amount}</p>
          `;
        } else {
          resultDiv.innerHTML = "Customer not found";
        }
      } catch (error) {
        resultDiv.innerHTML = "Error fetching customer details";
      }
    }
  </script>
</body>
</html>
